name: parking_finder
description: "Parking Finder - Crowdsourced parking availability app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.5.6
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  image_picker: ^1.0.5
  flutter_local_notifications: ^17.2.1
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  provider: ^6.1.1
  intl: ^0.18.1
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
